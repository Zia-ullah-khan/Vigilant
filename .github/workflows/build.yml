name: Build and Test
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libssl-dev

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install openssl -y
        # Note: cmake is usually pre-installed on GitHub Windows runners

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install openssl cmake

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Run Unit Tests
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./build/Release/vigilant_tests.exe "~[integration]"
        else
          ./build/vigilant_tests "~[integration]"
        fi

    - name: Prepare artifacts
      shell: bash
      run: |
        mkdir -p artifacts
        if [ "$RUNNER_OS" == "Windows" ]; then
          cp ./build/Release/vigilant.exe artifacts/vigilant-windows-x64.exe
        elif [ "$RUNNER_OS" == "macOS" ]; then
          cp ./build/vigilant artifacts/vigilant-macos-x64
        else
          cp ./build/vigilant artifacts/vigilant-linux-x64
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vigilant-${{ matrix.os }}
        path: artifacts/
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts
    
    - name: Organize artifacts
      shell: bash
      run: |
        mkdir -p release-bins
        cp release-artifacts/vigilant-ubuntu-latest/vigilant-linux-x64 release-bins/vigilant-linux-x64
        cp release-artifacts/vigilant-windows-latest/vigilant-windows-x64.exe release-bins/vigilant-windows-x64.exe
        cp release-artifacts/vigilant-macos-latest/vigilant-macos-x64 release-bins/vigilant-macos-x64
        chmod +x release-bins/vigilant-*
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release-bins/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}