name: Build, Test, and Package
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y cmake build-essential libssl-dev

    - name: Dependencies (Windows - FAST)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # Use pre-installed OpenSSL instead of Choco
        echo "OPENSSL_ROOT_DIR=C:\Program Files\OpenSSL-Win64" >> $env:GITHUB_ENV
        echo "C:\Program Files\OpenSSL-Win64\bin" >> $env:GITHUB_PATH

    - name: Dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install openssl cmake

    - name: Configure & Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Run Unit Tests
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./build/Release/vigilant_tests.exe "~[integration]"
        else
          ./build/vigilant_tests "~[integration]"
        fi

    - name: Prepare artifacts
      shell: bash
      run: |
        mkdir -p artifacts
        if [ "$RUNNER_OS" == "Windows" ]; then
          cp ./build/Release/vigilant.exe artifacts/vigilant-windows-x64.exe
        elif [ "$RUNNER_OS" == "macOS" ]; then
          cp ./build/vigilant artifacts/vigilant-macos-arm64
        else
          cp ./build/vigilant artifacts/vigilant-linux-x64
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vigilant-${{ matrix.os }}
        path: artifacts/
        retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release-artifacts/vigilant-ubuntu-latest/vigilant-linux-x64
          release-artifacts/vigilant-windows-latest/vigilant-windows-x64.exe
          release-artifacts/vigilant-macos-latest/vigilant-macos-arm64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Normalize image name
      id: image
      shell: bash
      run: |
        echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ${{ steps.image.outputs.name }}:latest
          ${{ steps.image.outputs.name }}:${{ github.ref_name }}