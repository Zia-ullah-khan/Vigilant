# Nginx config for Vigilant
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/
#
# This catches all *.rfas.software subdomains and forwards them to Vigilant.
# Vigilant handles domain-based routing to the correct backend service.

server {
    listen 80;
    server_name *.rfas.software;

    # Redirect HTTP to HTTPS (uncomment if you have SSL certs)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}

